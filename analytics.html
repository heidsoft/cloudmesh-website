<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - ITSM</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,15,35,0.98);border-bottom:1px solid rgba(102,126,234,0.2);">
    <div style="max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;">
        <a href="/" style="font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;white-space:nowrap;">☁ CloudMesh</a>
        <div style="display:flex;align-items:center;gap:0;flex-wrap:nowrap;">
            <a href="/" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">首页</a>
            <div style="position:relative;" class="nav-dropdown">
                <button onclick="this.parentElement.querySelector('.dd').classList.toggle('show')" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;background:none;border:none;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;border-radius:6px;transition:color 0.2s,background 0.2s;">产品 <span style="font-size:0.7rem;">▼</span></button>
                <div class="dd" style="display:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(22,22,42,0.98);border:1px solid rgba(102,126,234,0.3);border-radius:10px;padding:6px;min-width:190px;z-index:1001;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
                    <a href="/products/clawops.html" style="display:flex;align-items:center;gap:8px;padding:10px 14px;color:#a0aec0;text-decoration:none;font-size:0.85rem;border-radius:8px;transition:color 0.2s,background 0.2s;">🚀 ClawOps</a>
                    <a href="/products/itsm.html" style="display:flex;align-items:center;gap:8px;padding:10px 14px;color:#a0aec0;text-decoration:none;font-size:0.85rem;border-radius:8px;transition:color 0.2s,background 0.2s;">🎫 ITSM</a>
                    <div style="height:1px;background:rgba(102,126,234,0.15);margin:4px 8px;"></div>
                    <a href="/products/smart-replenishment.html" style="display:flex;align-items:center;gap:8px;padding:10px 14px;color:#a0aec0;text-decoration:none;font-size:0.85rem;border-radius:8px;transition:color 0.2s,background 0.2s;">📦 智能补货助手</a>
                    <a href="/products/contract-review.html" style="display:flex;align-items:center;gap:8px;padding:10px 14px;color:#a0aec0;text-decoration:none;font-size:0.85rem;border-radius:8px;transition:color 0.2s,background 0.2s;">📝 合同审核助手</a>
                </div>
            </div>
            <a href="/solutions/" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">解决方案</a>
            <a href="/open-source/" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">开源</a>
            <a href="/blog/" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">博客</a>
            <a href="/pricing.html" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">定价</a>
            <a href="/docs/quickstart.html" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">文档</a>
            <a href="/contact/" style="color:#a0aec0;font-size:0.85rem;padding:8px 12px;text-decoration:none;white-space:nowrap;border-radius:6px;transition:color 0.2s,background 0.2s;">联系</a>
            <a href="/deploy/" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:0.82rem;font-weight:700;padding:8px 16px;text-decoration:none;border-radius:50px;white-space:nowrap;margin-left:4px;transition:opacity 0.2s;">免费试用</a>
        </div>
    </div>
</nav>
<style>
.dd { display: none !important; }
.dd.show { display: block !important; }
.nav-dropdown:hover .dd { display: block !important; }
a:hover { color: #fff !important; background: rgba(102,126,234,0.1); }
button:hover { color: #fff !important; background: rgba(102,126,234,0.1) !important; }
</style>

    <section class="analytics-section">
        <div class="container">
            <h1>📊 官网统计分析</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>页面访问量</h3>
                    <div class="stat-value">0</div>
                    <p>总访问次数</p>
                </div>
                <div class="stat-card">
                    <h3>独立访客</h3>
                    <div class="stat-value">0</div>
                    <p>独立用户数</p>
                </div>
                <div class="stat-card">
                    <h3>试用申请</h3>
                    <div class="stat-value">0</div>
                    <p>试用申请表单</p>
                </div>
                <div class="stat-card">
                    <h3>联系咨询</h3>
                    <div class="stat-value">0</div>
                    <p>联系表单提交</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
