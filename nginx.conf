# CloudMesh 官网 Nginx 配置

# 主官网
server {
    listen 80;
    server_name cloudmesh.top www.cloudmesh.top;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# 部署系统子站
server {
    listen 80;
    server_name deploy.cloudmesh.top;
    
    # HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name deploy.cloudmesh.top;
    
    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/cloudmesh.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudmesh.top/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 静态文件
    location / {
        root /usr/share/nginx/html/deploy;
        try_files $uri $uri/ /index.html;
    }
}
