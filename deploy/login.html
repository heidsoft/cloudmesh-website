<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ClawOps 部署管理系统 | CloudMesh</title>
    <meta name="description" content="登录 ClawOps 部署管理系统，体验 AI 驱动的一人 DevOps 团队">
    
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dark-theme.css">
    

<!-- CloudMesh 统一导航栏 -->
<style>












</style>


    <div class="bg-animation">
        <div class="bg-gradient bg-gradient-1"></div>
        <div class="bg-gradient bg-gradient-2"></div>
        <div class="bg-gradient bg-gradient-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-rocket"></i>
                <h1 class="login-title">ClawOps</h1>
                <p class="login-subtitle">一个人的 DevOps 团队</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="login-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">记住我</label>
                    </div>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <div class="demo-notice">
                <i class="fas fa-info-circle"></i>
                <strong>演示模式</strong> - 登录功能需要后端 API 支持
            </div>

            <div class="quick-links">
                <a href="/" class="btn-quick btn-quick-primary">
                    <i class="fas fa-home"></i> 访问首页
                </a>
                <a href="/products/clawops.html" class="btn-quick btn-quick-outline">
                    <i class="fas fa-rocket"></i> ClawOps
                </a>
            </div>

            <div class="back-home">
                <a href="/">
                    <i class="fas fa-arrow-left"></i> 返回首页
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // 阻止表单默认提交，保持在当前页面
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            // 显示提示信息
            const email = this.querySelector('input[type="email"]').value;
            alert('欢迎，' + email + '！\n\n当前为演示模式，登录功能需要后端 API 支持。\n\n您可以访问：\n• 首页：https://cloudmesh.top/\n• ClawOps 产品：/products/clawops.html\n• ITSM 产品：/products/itsm.html');
            
            return false;
        });
    </script>
</body>
</html>
