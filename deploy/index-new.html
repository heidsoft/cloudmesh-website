<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 部署系统 - CloudMesh</title>
    
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/design-system.css">
    

<!-- CloudMesh 统一导航栏 -->
<style>












</style>


    <div class="app-container">
        <div class="app-header">
            <div class="app-icon">🚀</div>
            <h1 class="app-title">OpenClaw 部署管理系统</h1>
            <p class="app-subtitle">AI 驱动的智能部署管理平台</p>
        </div>

        <div class="status-card">
            <div class="status-item">
                <span class="status-label"><i class="fas fa-server"></i> API 状态</span>
                <span class="status-value" id="apiStatus">检测中...</span>
            </div>
            <div class="status-item">
                <span class="status-label"><i class="fas fa-network-wired"></i> API 地址</span>
                <span class="status-value">https://cloudmesh.top:8080</span>
            </div>
            <div class="status-item">
                <span class="status-label"><i class="fas fa-shield-alt"></i> 认证方式</span>
                <span class="status-value">API Key / OAuth</span>
            </div>
        </div>

        <div class="feature-list">
            <div class="feature-item">
                <i class="fas fa-check-circle"></i>
                <span>一键部署应用</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-check-circle"></i>
                <span>实时监控与告警</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-check-circle"></i>
                <span>AI 智能分析</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-check-circle"></i>
                <span>多环境管理</span>
            </div>
        </div>

        <div class="text-center">
            <a href="#" class="btn-app" onclick="alert('即将连接到部署系统...')">
                <i class="fas fa-sign-in-alt"></i> 进入系统
            </a>
            <a href="/" class="btn-outline-light-custom">
                <i class="fas fa-home"></i> 返回官网
            </a>
        </div>

        <div class="text-center mt-4">
            <small class="opacity-75">
                <i class="fas fa-info-circle"></i> 
                提示：首次使用需要注册账户，免费试用 30 天
            </small>
        </div>
    </div>

    <script>
        // 检测 API 状态
        async function checkApiStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch('/api/health', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    statusEl.innerHTML = '<span style="color: #4ade80;">● 正常运行</span>';
                } else {
                    statusEl.innerHTML = '<span style="color: #fbbf24;">● 部分可用</span>';
                }
            } catch (error) {
                statusEl.innerHTML = '<span style="color: #f87171;">● 连接中</span>';
            }
        }
        
        checkApiStatus();
    </script>
</body>
</html>
